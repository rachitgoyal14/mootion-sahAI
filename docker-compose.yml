version: "3.9"

services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env                     # root .env (only POSTGRES_* vars)
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    restart: unless-stopped
    env_file:
      - ./backend/.env           # backend-specific env
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  worker:
    build:
      context: ./backend
      dockerfile: DockerFile
    restart: unless-stopped
    env_file:
      - ./backend/.env           # worker shares backend env (or create worker/.env if needed)
    depends_on:
      - backend
      - redis
      - db
    command: python -m app.services.media_worker

  animation-engine:
    build:
      context: ./animation-engine
      dockerfile: dockerfile
    restart: unless-stopped
    env_file:
      - ./animation-engine/app/.env   # animation-engine env
    expose:
      - "8001"
    volumes:
      - ./animation-engine/outputs:/app/outputs

  frontend:
    build:
      context: ./frontend
      # we'll copy frontend/.env inside the Dockerfile during build
    restart: unless-stopped
    expose:
      - "3000"
    # No env_file needed here because we embed vars at build time

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - animation-engine

volumes:
  postgres_data: