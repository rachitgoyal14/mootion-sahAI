services:
  mootion-backend:
    image: python:3.11-slim
    container_name: mootion-backend
    working_dir: /app
    command: sh -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: sqlite:///./mootion.db
      FRONTEND_URL: http://localhost:3000
      BACKEND_PUBLIC_URL: http://localhost:8000
      MANIM_SERVICE_URL: http://manim-engine:8001/explain
      MANIM_SERVICE_BASE_URL: http://manim-engine:8001
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_MEDIA_BUCKET: mootion-media
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - minio
      - manim-engine
    restart: unless-stopped

  mootion-worker:
    image: python:3.11-slim
    container_name: mootion-worker
    working_dir: /app
    command: sh -lc "pip install -r requirements.txt && python -m app.services.media_worker"
    environment:
      DATABASE_URL: sqlite:///./mootion.db
      BACKEND_PUBLIC_URL: http://localhost:8000
      MANIM_SERVICE_URL: http://manim-engine:8001/explain
      MANIM_SERVICE_BASE_URL: http://manim-engine:8001
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_MEDIA_BUCKET: mootion-media
    volumes:
      - ./backend:/app
    depends_on:
      - mootion-backend
      - redis
      - minio
      - manim-engine
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: frontend

    environment:
      GEMINI_API_KEY: "AIzaSyDJWjudoaGxCVLbHo-PdjzVoirvM1r-oqg"
      APP_URL: "http://localhost:3000"

    expose:
      - "5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    restart: unless-stopped

  bloop-backend:
    build:
      context: ./bloop-core

    container_name: bloop-backend

    expose:
      - "8000"

    restart: unless-stopped

  manim-engine:
    build:
      context: ./animation-engine

    container_name: manim-engine

    expose:
      - "8001"

    volumes:
      - ./animation-engine:/app

    restart: unless-stopped

  nginx:
    image: nginx:latest

    container_name: nginx

    depends_on:
      - mootion-backend
      - frontend
      - bloop-backend
      - manim-engine
      - redis
      - minio

    ports:
      - "1313:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

    restart: unless-stopped

volumes:
  minio_data:
