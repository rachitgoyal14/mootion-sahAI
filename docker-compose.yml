services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - MANIM_SERVICE_URL=http://animation-engine:8001/explain
      - MANIM_SERVICE_BASE_URL=http://animation-engine:8001
    volumes:
      - ./backend/sims.json:/app/sim/sims.json
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  worker:
    build:
      context: ./backend
      dockerfile: DockerFile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - MANIM_SERVICE_URL=http://animation-engine:8001/explain
      - MANIM_SERVICE_BASE_URL=http://animation-engine:8001
    depends_on:
      - backend
      - redis
      - db
    command: python -m app.services.media_worker

  animation-engine:
    build:
      context: ./animation-engine
      dockerfile: dockerfile
    restart: unless-stopped
    env_file:
      - ./animation-engine/app/.env
    expose:
      - "8001"
    volumes:
      - ./animation-engine/outputs:/app/outputs

  frontend:
    build:
      context: ./frontend
      args:
        - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - animation-engine

volumes:
  postgres_data:
